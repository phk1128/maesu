    resourceserver:
      jwt:
        jwk-set-uri: https://whyumsehphqhenqvxwuo.supabase.co/auth/v1/.well-known/jwks.json

logging:
  level:
    com.colosseum.backend: DEBUG
    org.hibernate.SQL: DEBUG
